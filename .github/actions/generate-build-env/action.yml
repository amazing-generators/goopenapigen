name: 'Read build metadata'
description: 'Read project name and version from the manifest'

runs:
  using: 'composite'
  steps:
    - name: 📥 Read build metadata
      id: ver
      shell: bash
      run: |
        set -Eeuo pipefail
        nameBuild=$(go run ./cmd/goopenapigen manifest get -source ./_run/values.yml -field name)
        versionBuild=$(go run ./cmd/goopenapigen version print -source ./_run/values.yml)

        echo "BUILD_NAME=$nameBuild"   >  build_env.txt
        echo "BUILD_VER=$versionBuild" >> build_env.txt

        echo "name=$nameBuild"   >> $GITHUB_OUTPUT
        echo "version=$versionBuild" >> $GITHUB_OUTPUT

        echo "✔️ Found version: $versionBuild (Package Name: $nameBuild)"
