name: "Release"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:

env:
  GO_VERSION: "1.25"

jobs:
  prepare:
    name: "🔧 Prepare"
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/tidy-all-and-generate

      - name: 📦 Upload source
        uses: actions/upload-artifact@v7
        with:
          name: src-gen
          path: .

  test:
    name: "🧪 Test [${{ matrix.os }}]"
    needs: [ prepare ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-15, windows-latest ]

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: 📥 Download source
        uses: actions/download-artifact@v8
        with:
          name: src-gen
          path: .


      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/run-tests

  bump-version:
    name: "📦 Minor version bump"
    needs: [ test ]
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/github-setup-user

      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/tidy-all-and-generate

      - name: 📦 Increment minor version
        shell: bash
        run: |
          set -Eeuo pipefail
          new_ver=$(go run github.com/amazing-generators/gometagen/cmd/gometagen@latest version minor -source ./_run/values.yml)
          echo "New version: $new_ver"

          git add _run/values.yml
          git commit -m "minor(${new_ver}): release"
          git push origin HEAD:main

      - uses: ./.github/actions/generate-build-env

      - name: 📦 Upload release env
        uses: actions/upload-artifact@v7
        with:
          name: release-env
          path: build_env.txt

  build:
    name: "🛠️ Build binaries"
    needs: [ bump-version ]
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: 📥 Download release env
        uses: actions/download-artifact@v8
        with:
          name: release-env
          path: .

      - name: 🗒️ Source env
        shell: bash
        run: cat build_env.txt >> $GITHUB_ENV

      - uses: ./.github/actions/init-go
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: ./.github/actions/tidy-all-and-generate

      - name: 🛠️ Cross-compile all targets
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p dist

          # format: GOOS/GOARCH
          targets=(
            windows/amd64
            windows/arm64
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
          )

          for target in "${targets[@]}"; do
            IFS='/' read -r os arch <<< "$target"

            export GOOS="$os"
            export GOARCH="$arch"
            export CGO_ENABLED=0

            suffix=""
            tag="${os}-${arch}"

            if [[ "$os" == "windows" ]]; then
              suffix=".exe"
            fi

            outname="${BUILD_NAME}-${tag}${suffix}"
            echo "→ ${outname}"
            go build -trimpath -ldflags="-s -w" -o "dist/${outname}" ./cmd/goopenapigen
          done

          echo ""
          echo "=== Built $(ls dist/ | wc -l) binaries ==="
          ls -lhS dist/

      - name: 📦 Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          if-no-files-found: error
          path: dist/

  release:
    name: "🚀 Release"
    needs: [ bump-version, build ]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: 📥 Download release env
        uses: actions/download-artifact@v8
        with:
          name: release-env
          path: .


      - name: 🗒️ Source env
        shell: bash
        run: cat build_env.txt >> $GITHUB_ENV

      - name: 📥 Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist

      - name: 🔄 Refresh main
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch origin main --tags
          git reset --hard origin/main

      - uses: ./.github/actions/github-setup-user

      - name: 🏷️ Create stripped tag ${{ env.BUILD_VER }}
        shell: bash
        run: |
          set -Eeuo pipefail
          ORIG_SHA=$(git rev-parse HEAD)

          paths_arr=()
          while IFS= read -r -d '' path; do
            paths_arr+=("$path")
          done < <(
            git ls-files -z \
              | grep -zE '^(examples/|\.github/|_run/)|\.[mM][dD]$' || true
          )

          if [ "${#paths_arr[@]}" -gt 0 ]; then
            git rm -r --ignore-unmatch -- "${paths_arr[@]}"
            git commit -m "release(${BUILD_VER}): strip non-release files"
          fi

          git tag -a "${BUILD_VER}" -m "Release ${BUILD_VER}"
          git push origin "${BUILD_VER}"

          git reset --hard "$ORIG_SHA"

      - name: 🚀 Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VER }}
          name: ${{ env.BUILD_VER }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            src-gen
            release-env
            binaries
          failOnError: false
