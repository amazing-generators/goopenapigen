type: object
required: [ id, author, body, createdAt ]
properties:
  id:
    type: string
    format: uuid
  author:
    $ref: schemas/user_summary
  body:
    type: string
    minLength: 1
    maxLength: 2000
  attachments:
    type: array
    items:
      type: object
      required: [ name, url ]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties:
            type: string
  createdAt:
    type: string
    format: date-time
