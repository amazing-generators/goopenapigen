# Shared components: one file can provide multiple components fields: schemas, responses, parameters.

schemas:
  Status:
    type: object
    required: [ status ]
    properties:
      status:
        type: string
        enum: [ ok, degraded ]
      uptimeSeconds:
        type: integer
        format: int64
        minimum: 0

  Error:
    type: object
    required: [ code, message ]
    properties:
      code:
        type: integer
        format: int32
        description: Machine-readable error code.
      message:
        type: string
        description: Human-readable message.
      details:
        type: array
        items:
          type: string

responses:
  Problem:
    description: Error response.
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/DefaultError'

parameters:
  Limit:
    name: limit
    in: query
    required: false
    description: Maximum number of items to return.
    schema:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20

  Offset:
    name: offset
    in: query
    required: false
    description: Number of items to skip.
    schema:
      type: integer
      format: int32
      minimum: 0
      default: 0
