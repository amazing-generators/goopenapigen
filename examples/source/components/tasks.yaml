# A file in components/ provides components subfields, here schemas.
# Several such files merge into one components.schemas object in the assembled document.
# Graph depth is driven by internal refs: Task -> Project -> Label.

schemas:
  Task:
    type: object
    required: [ id, title, status, project ]
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
        minLength: 1
        maxLength: 200
      status:
        type: string
        enum: [ open, in_progress, done ]
      project:
        $ref: '#/components/schemas/Project'
      labels:
        type: array
        items:
          $ref: '#/components/schemas/Label'
      createdAt:
        type: string
        format: date-time

  NewTask:
    type: object
    required: [ title, projectId ]
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 200
      projectId:
        type: string
        format: uuid
      labels:
        type: array
        items:
          $ref: '#/components/schemas/Label'

  Project:
    type: object
    required: [ id, name ]
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        minLength: 1
      defaultLabel:
        $ref: '#/components/schemas/Label'

  Label:
    type: object
    required: [ name ]
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 40
      color:
        type: string
        pattern: '^#[0-9a-fA-F]{6}$'
        description: 'Hex color, e.g. #1a2b3c.'
