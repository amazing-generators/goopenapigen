# This file contributes both schemas and securitySchemes under components.
# x-func on a security scheme binds validation to a router bridge method.

schemas:
  LoginRequest:
    type: object
    required: [ email, password ]
    properties:
      email:
        type: string
        format: email
      password:
        type: string
        format: password
        minLength: 8

  LoginResponse:
    type: object
    required: [ token, expiresIn ]
    properties:
      token:
        type: string
      expiresIn:
        type: integer
        format: int32
        description: Token lifetime in seconds.

securitySchemes:
  BearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
    description: Bearer JWT in the Authorization header.
    x-func: VerifyBearer

  ApiKeyHeader:
    type: apiKey
    in: header
    name: X-API-Key
    description: Static API key for service-to-service calls.
    x-func: VerifyApiKey
